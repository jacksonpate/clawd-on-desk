<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --card-bg:      #18181b;
    --card-border:  rgba(255,255,255,0.1);
    --card-shadow:  0 4px 20px rgba(0,0,0,0.4);
    --text-primary: #f4f4f5;
    --text-sub:     #a1a1aa;
    --input-bg:     #09090b;
    --input-border: rgba(255,255,255,0.08);
    --btn-bg:       #d97757;
    --btn-hover:    #c4684a;
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
    --accent:       #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Card shell ── */
  .card {
    background: var(--card-bg);
    border: 2px solid var(--accent);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: row;
    width: 320px;
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transform-origin: center top;
    transition: opacity 0.25s ease, transform 0.35s var(--ease-spring);
  }
  .card.visible {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
  .card.drop-active {
    border-color: var(--accent);
    box-shadow: var(--card-shadow), 0 0 0 2px var(--accent);
  }
  .card.drop-active textarea {
    border-color: var(--accent);
  }

  /* accent-bar removed — full border handles color now */
  .accent-bar { display: none; }

  /* ── Inner content ── */
  .card-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 12px 12px;
    min-width: 0;
  }

  /* ── Header — drag handle ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
    -webkit-app-region: drag;
    cursor: grab;
  }
  /* Everything interactive inside the header must opt out of drag */
  .close-btn { -webkit-app-region: no-drag; }
  .session-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sending-to {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 7px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.01em;
    background: rgba(107,114,128,0.15);
    color: #6b7280;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #6b7280;
  }
  .close-btn {
    width: 20px; height: 20px;
    border: none; background: none;
    cursor: pointer; color: var(--text-sub);
    font-size: 16px; line-height: 1; padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; transition: background 0.15s;
    flex-shrink: 0; margin-top: 1px;
  }
  .close-btn:hover { background: rgba(255,255,255,0.08); }

  /* ── Non-drag zones ── */
  #messages, #thinkingEl, textarea, .footer, .send-btn, .hint {
    -webkit-app-region: no-drag;
  }

  /* ── Message thread ── */
  #messages {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 160px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }
  #messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
  .msg {
    max-width: 90%;
    font-size: 12.5px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    padding: 7px 10px;
    border-radius: 10px;
    animation: msgPop 0.18s ease;
  }
  @keyframes msgPop {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-user {
    align-self: flex-end;
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .msg-claude {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 3px;
  }

  /* ── Thinking ── */
  #thinkingEl {
    display: none;
    font-size: 11px;
    color: #9ca3af;
    font-style: italic;
    padding-left: 2px;
    flex-shrink: 0;
  }

  /* ── Textarea ── */
  textarea {
    width: 100%;
    min-height: 58px;
    max-height: 160px;
    resize: none;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 10px;
    padding: 9px 11px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    outline: none;
    line-height: 1.5;
    transition: border-color 0.15s;
    overflow-y: auto;
    flex-shrink: 0;
  }
  textarea:focus { border-color: var(--btn-bg); }
  textarea::placeholder { color: var(--text-sub); }

  /* ── Footer ── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .hint { font-size: 11px; color: var(--text-sub); }
  .send-btn {
    background: var(--btn-bg); color: #fff;
    border: none; border-radius: 8px;
    padding: 7px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover  { background: var(--btn-hover); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.45; cursor: default; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="accent-bar" id="accentBar"></div>
  <div class="card-inner">
    <div class="header">
      <div class="session-info">
        <div class="pill" id="sessionPill">
          <span class="dot" id="sessionDot"></span>
          <span id="sessionName">Clawd</span>
        </div>
      </div>
      <button class="close-btn" id="closeBtn" title="Close">×</button>
    </div>
    <div id="messages"></div>
    <div id="thinkingEl">Claude is thinking…</div>
    <textarea id="input" placeholder="Ask anything…" autofocus></textarea>
    <div class="footer">
      <span class="hint">↵ send &nbsp;·&nbsp; ⇧↵ newline</span>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
const card       = document.getElementById("card");
const accentBar  = document.getElementById("accentBar");
const messages   = document.getElementById("messages");
const thinkingEl = document.getElementById("thinkingEl");
const pill       = document.getElementById("sessionPill");
const dot        = document.getElementById("sessionDot");
const nameEl     = document.getElementById("sessionName");
const input      = document.getElementById("input");
const sendBtn    = document.getElementById("sendBtn");
const closeBtn   = document.getElementById("closeBtn");

let accentColor = "#6b7280";

function reportHeight() {
  window.chatAPI.reportHeight(card.offsetHeight + 4);
}

function applySession(data) {
  const name  = (data && data.name)  || "Clawd";
  const color = (data && data.color) || "#6b7280";
  accentColor = color;
  accentBar.style.background = color;
  card.style.borderColor     = color;
  dot.style.background       = color;
  nameEl.textContent         = name;
  pill.style.background = color + "26";
  pill.style.color      = color;
  // Recolor any existing user message bubbles to match new terminal
  document.querySelectorAll(".msg-user").forEach(m => { m.style.background = color; });
}

function addMessage(text, role) {
  const el = document.createElement("div");
  el.className = "msg msg-" + role;
  el.textContent = text;
  if (role === "user") el.style.background = accentColor;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
  reportHeight();
}

// ── Initial show: animate card in, apply session ──
window.chatAPI.onShow((data) => {
  applySession(data);
  card.classList.add("visible");
  input.focus();
  setTimeout(reportHeight, 50);
});

// ── Session update: name/color changed — update header only, don't clear ──
if (window.chatAPI.onSessionUpdate) {
  window.chatAPI.onSessionUpdate((data) => {
    applySession(data);
  });
}

window.chatAPI.onHide(() => {
  card.classList.remove("visible");
});

// ── Thinking state ──
if (window.chatAPI.onThinking) {
  window.chatAPI.onThinking((val) => {
    thinkingEl.style.display = val ? "block" : "none";
    sendBtn.disabled = val;
    reportHeight();
  });
}

// ── User message echo (show sent message in thread) ──
if (window.chatAPI.onUserMessage) {
  window.chatAPI.onUserMessage((data) => {
    addMessage(data.text || "", "user");
  });
}

// ── Claude response ──
if (window.chatAPI.onMessage) {
  window.chatAPI.onMessage((data) => {
    thinkingEl.style.display = "none";
    sendBtn.disabled = false;
    addMessage(data.text || "", "claude");
    input.focus();
  });
}

// ── Send ──
function doSend() {
  const msg = input.value.trim();
  if (!msg) return;
  sendBtn.disabled = true;
  window.chatAPI.send(msg);
  input.value = "";
  input.style.height = "auto";
  reportHeight();
}

sendBtn.addEventListener("click", doSend);
closeBtn.addEventListener("click", () => window.chatAPI.close());

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

// Auto-resize textarea as user types
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
  reportHeight();
});

// ── File drag & drop ──────────────────────────────────────────────────────
const TEXT_EXTS = new Set([
  "txt","md","js","ts","jsx","tsx","mjs","cjs","json","jsonc",
  "css","scss","sass","html","htm","xml","svg","yaml","yml",
  "py","rb","rs","go","java","c","cpp","h","cs","php","sh","bash",
  "zsh","fish","ps1","env","ini","toml","sql","csv","log","conf",
  "config","gitignore","dockerfile","makefile","r","lua","ex","exs",
]);

function fileExt(name) {
  const i = name.lastIndexOf(".");
  return i >= 0 ? name.slice(i + 1).toLowerCase() : "";
}

function appendToInput(text) {
  const cur = input.value.trim();
  input.value = cur ? cur + "\n\n" + text : text;
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
  reportHeight();
  input.focus();
  // Put cursor at end
  input.selectionStart = input.selectionEnd = input.value.length;
}

card.addEventListener("dragover", (e) => {
  if (!e.dataTransfer.types.includes("Files")) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = "copy";
  card.classList.add("drop-active");
});

card.addEventListener("dragleave", (e) => {
  // Only remove highlight when leaving the card entirely
  if (!card.contains(e.relatedTarget)) card.classList.remove("drop-active");
});

card.addEventListener("drop", (e) => {
  e.preventDefault();
  card.classList.remove("drop-active");

  const files = Array.from(e.dataTransfer.files || []);
  if (!files.length) return;

  const MAX_TEXT = 150 * 1024; // 150 KB — above this just send path

  const BINARY_EXTS = new Set([
    "png","jpg","jpeg","gif","bmp","webp","ico","tiff","svg",
    "mp3","mp4","wav","ogg","flac","aac","m4a","mkv","avi","mov",
    "zip","tar","gz","rar","7z","exe","dll","so","dylib",
    "pdf","doc","docx","xls","xlsx","ppt","pptx",
    "wasm","bin","dat","db","sqlite","pyc","class",
  ]);

  for (const file of files) {
    const ext      = fileExt(file.name);
    const filePath = (window.chatAPI.getFilePath && window.chatAPI.getFilePath(file)) || file.path || file.name;

    // Known binary formats → just send path (can't embed)
    if (BINARY_EXTS.has(ext)) {
      appendToInput(`File path: ${filePath}\n(Binary file — Claude cannot read contents directly)`);
      continue;
    }

    // Everything else (including no-extension files) — try reading as text
    if (file.size <= MAX_TEXT) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const contents = ev.target.result;
        // Check if it looks binary (contains null bytes)
        if (contents.includes("\0")) {
          appendToInput(`File path: ${filePath}\n(Binary file — Claude cannot read contents directly)`);
          return;
        }
        const lang = ext || "text";
        appendToInput(`File: ${file.name}\nPath: ${filePath}\n\`\`\`${lang}\n${contents}\n\`\`\``);
      };
      reader.onerror = () => appendToInput(`(Could not read file — it may be a folder or locked)\nPath: ${filePath}`);
      reader.readAsText(file);
    } else {
      // Too large to embed — send path and size
      const kb = Math.round(file.size / 1024);
      appendToInput(`File path: ${filePath}\n(File is ${kb}KB — too large to embed. Reference the path above.)`);
    }
  }
});
</script>
</body>
</html>
