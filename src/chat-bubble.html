<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --card-bg:      #ffffff;
    --card-border:  rgba(0,0,0,0.08);
    --card-shadow:  0 4px 20px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
    --text-primary: #18181b;
    --text-sub:     #71717a;
    --input-bg:     #f4f4f5;
    --input-border: rgba(0,0,0,0.08);
    --btn-bg:       #d97757;
    --btn-hover:    #c4684a;
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --card-bg:      #18181b;
      --card-border:  rgba(255,255,255,0.1);
      --card-shadow:  0 4px 20px rgba(0,0,0,0.4);
      --text-primary: #f4f4f5;
      --text-sub:     #a1a1aa;
      --input-bg:     #09090b;
      --input-border: rgba(255,255,255,0.08);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Card shell — row layout for accent bar ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: row;
    width: 320px;
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transform-origin: center top;
    transition: opacity 0.25s ease, transform 0.35s var(--ease-spring);
  }
  .card.visible {
    opacity: 1;
    transform: translateX(0) scale(1);
  }

  /* ── Left accent bar ── */
  .accent-bar {
    width: 4px;
    flex-shrink: 0;
    background: #6b7280;
    border-radius: 15px 0 0 15px;
  }

  /* ── Inner content ── */
  .card-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px 16px 12px 12px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .session-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sending-to {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 7px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.01em;
    background: rgba(107,114,128,0.15);
    color: #6b7280;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #6b7280;
  }
  .close-btn {
    width: 20px;
    height: 20px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-sub);
    font-size: 16px;
    line-height: 1;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    transition: background 0.15s;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .close-btn:hover { background: var(--input-bg); }

  /* ── Input ── */
  textarea {
    width: 100%;
    min-height: 72px;
    max-height: 180px;
    resize: none;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 10px;
    padding: 9px 11px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    outline: none;
    line-height: 1.5;
    transition: border-color 0.15s;
    overflow-y: auto;
  }
  textarea:focus { border-color: var(--btn-bg); }
  textarea::placeholder { color: var(--text-sub); }

  /* ── Footer ── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hint {
    font-size: 11px;
    color: var(--text-sub);
  }
  .send-btn {
    background: var(--btn-bg);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover  { background: var(--btn-hover); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.45; cursor: default; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="accent-bar" id="accentBar"></div>
  <div class="card-inner">
    <div class="header">
      <div class="session-info">
        <span class="sending-to">Sending to</span>
        <div class="pill" id="sessionPill">
          <span class="dot" id="sessionDot"></span>
          <span id="sessionName">Clawd</span>
        </div>
      </div>
      <button class="close-btn" id="closeBtn" title="Close">×</button>
    </div>
    <textarea id="input" placeholder="Ask anything…" rows="3" autofocus></textarea>
    <div class="footer">
      <span class="hint">↵ send &nbsp;·&nbsp; ⇧↵ newline</span>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
const card      = document.getElementById("card");
const accentBar = document.getElementById("accentBar");
const pill      = document.getElementById("sessionPill");
const dot       = document.getElementById("sessionDot");
const nameEl    = document.getElementById("sessionName");
const input     = document.getElementById("input");
const sendBtn   = document.getElementById("sendBtn");
const closeBtn  = document.getElementById("closeBtn");

function reportHeight() {
  window.chatAPI.reportHeight(card.offsetHeight + 4);
}

function applySession(data) {
  const name  = (data && data.name)  || "Clawd";
  const color = (data && data.color) || "#6b7280";

  accentBar.style.background = color;
  dot.style.background       = color;
  nameEl.textContent         = name;

  // pill: translucent fill + colored text (append 26 = ~15% alpha to 6-digit hex)
  pill.style.background = color + "26";
  pill.style.color      = color;
}

window.chatAPI.onShow((data) => {
  applySession(data);
  card.classList.add("visible");
  input.value = "";
  input.focus();
  setTimeout(reportHeight, 50);
});

window.chatAPI.onHide(() => {
  card.classList.remove("visible");
});

function doSend() {
  const msg = input.value.trim();
  if (!msg) return;
  sendBtn.disabled = true;
  window.chatAPI.send(msg);
  input.value = "";
  setTimeout(() => {
    sendBtn.disabled = false;
    input.focus();
  }, 600);
}

sendBtn.addEventListener("click", doSend);
closeBtn.addEventListener("click", () => window.chatAPI.close());

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

// Auto-resize textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 180) + "px";
  reportHeight();
});
</script>
</body>
</html>
