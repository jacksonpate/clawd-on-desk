<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --card-bg:      #ffffff;
    --card-border:  rgba(0,0,0,0.08);
    --card-shadow:  0 4px 20px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
    --text-primary: #18181b;
    --text-sub:     #71717a;
    --input-bg:     #f4f4f5;
    --input-border: rgba(0,0,0,0.08);
    --btn-bg:       #d97757;
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --card-bg:      #18181b;
      --card-border:  rgba(255,255,255,0.1);
      --card-shadow:  0 4px 20px rgba(0,0,0,0.4);
      --text-primary: #f4f4f5;
      --text-sub:     #a1a1aa;
      --input-bg:     #09090b;
      --input-border: rgba(255,255,255,0.08);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 14px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateX(60px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.4s var(--ease-spring);
    width: 340px;
    cursor: pointer;
    user-select: none;
  }
  .card.visible {
    opacity: 1;
    transform: translateX(0) scale(1);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .close-hint {
    font-size: 11px;
    color: var(--text-sub);
    opacity: 0.6;
  }

  .response-text {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.6;
    max-height: 260px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    padding-right: 2px;
    /* scrollbar styling */
    scrollbar-width: thin;
    scrollbar-color: var(--input-border) transparent;
  }
  .response-text::-webkit-scrollbar {
    width: 4px;
  }
  .response-text::-webkit-scrollbar-track {
    background: transparent;
  }
  .response-text::-webkit-scrollbar-thumb {
    background: var(--input-border);
    border-radius: 2px;
  }

  /* Progress bar */
  .progress-wrap {
    height: 3px;
    background: transparent;
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    margin: 6px -16px 0;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: var(--btn-bg);
    border-radius: 0 0 16px 16px;
    transform-origin: left center;
    animation: none;
  }
  .progress-bar.running {
    animation: shrink 15s linear forwards;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <span class="title">Claude</span>
    <span class="close-hint">click to dismiss</span>
  </div>
  <div class="response-text" id="responseText"></div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
const card        = document.getElementById("card");
const responseText = document.getElementById("responseText");
const progressBar  = document.getElementById("progressBar");

function reportHeight() {
  window.responseAPI.reportHeight(card.offsetHeight + 4);
}

window.responseAPI.onShow(({ text }) => {
  // Reset progress bar
  progressBar.classList.remove("running");
  void progressBar.offsetWidth; // force reflow to restart animation

  responseText.textContent = text || "";
  card.classList.add("visible");

  // Start countdown
  requestAnimationFrame(() => {
    progressBar.classList.add("running");
  });

  setTimeout(reportHeight, 50);
});

window.responseAPI.onHide(() => {
  card.classList.remove("visible");
  progressBar.classList.remove("running");
});

window.responseAPI.onPin(() => {
  progressBar.classList.remove("running");
  // Small visual indicator that it's pinned — dim the progress bar area
  progressBar.style.opacity = "0.3";
});

// Left-click to dismiss
card.addEventListener("click", (e) => {
  if (e.button === 0) window.responseAPI.close();
});

// Right-click to pin (stay open indefinitely)
card.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  window.responseAPI.pin();
});
</script>
</body>
</html>
